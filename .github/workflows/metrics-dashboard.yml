name: Metrics Dashboard

on:
  pull_request:
    paths:
      - ".github/workflows/metrics-dashboard.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "specs/metrics-dashboard.md"
      - "specs/metrics-dashboard.test.md"
      - "src/main/kotlin/com/kingsmetric/dashboard/**"
      - "src/test/kotlin/com/kingsmetric/dashboard/**"
      - "src/main/kotlin/com/kingsmetric/history/MatchHistory.kt"
  push:
    branches:
      - main
      - feature/**
    paths:
      - ".github/workflows/metrics-dashboard.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "specs/metrics-dashboard.md"
      - "specs/metrics-dashboard.test.md"
      - "src/main/kotlin/com/kingsmetric/dashboard/**"
      - "src/test/kotlin/com/kingsmetric/dashboard/**"
      - "src/main/kotlin/com/kingsmetric/history/MatchHistory.kt"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run metrics dashboard tests
        run: >
          ./gradlew --no-daemon :core:test
          --tests "com.kingsmetric.dashboard.MetricsDashboardTest"
