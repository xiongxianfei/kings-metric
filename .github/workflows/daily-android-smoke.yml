name: Daily Android Smoke

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-shell-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Android app shell smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: default
          profile: pixel
          emulator-boot-timeout: 900
          disable-animations: false
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            # The full AppShellNavigationComposeTest class is a known unstable
            # emulator batch. Keep this scheduled smoke on the verified slices.
            ./gradlew --no-daemon :app:connectedDebugAndroidTest "-Pandroid.testInstrumentationRunnerArguments.class=com.kingsmetric.AppShellNavigationComposeTest#primaryNavigation_moves_between_import_history_and_dashboard_with_context"
            ./gradlew --no-daemon :app:connectedDebugAndroidTest "-Pandroid.testInstrumentationRunnerArguments.class=com.kingsmetric.AppShellNavigationComposeTest#importToReviewToSave_completesSaveThroughTheRuntimeShell,com.kingsmetric.AppShellNavigationComposeTest#reviewRoute_is_a_focused_task_screen_with_close_behavior,com.kingsmetric.AppShellNavigationComposeTest#detailRoute_has_back_behavior_and_returns_to_history"
