name: Android App Shell And Navigation

on:
  pull_request:
    paths:
      - ".github/workflows/android-app-shell-and-navigation.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "specs/android-app-shell-and-navigation.md"
      - "specs/android-app-shell-and-navigation.test.md"
      - "app/build.gradle.kts"
      - "app/src/main/AndroidManifest.xml"
      - "app/src/main/java/com/kingsmetric/**"
      - "app/src/androidTest/java/com/kingsmetric/**"
      - "src/main/kotlin/com/kingsmetric/app/**"
      - "src/test/kotlin/com/kingsmetric/app/**"
  push:
    branches:
      - main
      - feature/**
    paths:
      - ".github/workflows/android-app-shell-and-navigation.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "specs/android-app-shell-and-navigation.md"
      - "specs/android-app-shell-and-navigation.test.md"
      - "app/build.gradle.kts"
      - "app/src/main/AndroidManifest.xml"
      - "app/src/main/java/com/kingsmetric/**"
      - "app/src/androidTest/java/com/kingsmetric/**"
      - "src/main/kotlin/com/kingsmetric/app/**"
      - "src/test/kotlin/com/kingsmetric/app/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run app shell navigation tests
        run: >
          ./gradlew --no-daemon :core:test
          --tests "com.kingsmetric.app.AndroidAppShellNavigationTest"

      - name: Assemble Android app shell targets
        run: >
          ./gradlew --no-daemon
          :app:assembleDebug
          :app:assembleDebugAndroidTest
