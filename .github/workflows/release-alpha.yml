name: Release Alpha

on:
  workflow_dispatch:
    inputs:
      confirm_release_gate_ready:
        description: "Confirm the release gate is ready for this candidate"
        required: true
        type: boolean
      confirm_manual_device_flow:
        description: "Confirm the supported import -> review -> save -> history flow was validated on a real device"
        required: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-alpha
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Load release metadata
        id: metadata
        shell: bash
        run: |
          VERSION_TAG="$(grep '^versionTag=' .github/release-metadata.properties | cut -d= -f2-)"
          REPOSITORY_DESCRIPTION="$(grep '^repositoryDescription=' .github/release-metadata.properties | cut -d= -f2-)"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "repository_description=$REPOSITORY_DESCRIPTION" >> "$GITHUB_OUTPUT"
          echo "notes_path=docs/releases/${VERSION_TAG}.md" >> "$GITHUB_OUTPUT"

      - name: Validate release gate confirmations
        shell: bash
        run: |
          if [ "${{ inputs.confirm_release_gate_ready }}" != "true" ]; then
            echo "Release gate confirmation is required before publication." >&2
            exit 1
          fi
          if [ "${{ inputs.confirm_manual_device_flow }}" != "true" ]; then
            echo "Manual device flow confirmation is required before publication." >&2
            exit 1
          fi

      - name: Sync repository description
        if: ${{ secrets.GH_REPO_ADMIN_TOKEN != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_REPO_ADMIN_TOKEN }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}" \
            --method PATCH \
            -f description="${{ steps.metadata.outputs.repository_description }}"

      - name: Validate release secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Prepare signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release-keystore.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Verify and build release artifact
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :core:test :app:assembleRelease

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.version_tag }}
          name: ${{ steps.metadata.outputs.version_tag }}
          body_path: ${{ steps.metadata.outputs.notes_path }}
          prerelease: true
          files: app/build/outputs/apk/release/app-release.apk
