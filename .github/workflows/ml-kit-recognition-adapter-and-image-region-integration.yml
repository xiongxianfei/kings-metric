name: ML Kit Recognition Adapter And Image Region Integration

on:
  pull_request:
    paths:
      - ".github/workflows/ml-kit-recognition-adapter-and-image-region-integration.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "app/build.gradle.kts"
      - "app/src/main/java/com/kingsmetric/app/AndroidMlKitTextRecognition.kt"
      - "app/src/androidTest/java/com/kingsmetric/AndroidMlKitRecognitionAdapterTest.kt"
      - "specs/ml-kit-recognition-adapter-and-image-region-integration.md"
      - "specs/ml-kit-recognition-adapter-and-image-region-integration.test.md"
      - "src/main/kotlin/com/kingsmetric/app/MlKitRecognitionAdapter.kt"
      - "src/test/kotlin/com/kingsmetric/app/MlKitRecognitionAdapterIntegrationTest.kt"
      - "src/main/kotlin/com/kingsmetric/importflow/**"
  push:
    branches:
      - main
      - feature/**
    paths:
      - ".github/workflows/ml-kit-recognition-adapter-and-image-region-integration.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "app/build.gradle.kts"
      - "app/src/main/java/com/kingsmetric/app/AndroidMlKitTextRecognition.kt"
      - "app/src/androidTest/java/com/kingsmetric/AndroidMlKitRecognitionAdapterTest.kt"
      - "specs/ml-kit-recognition-adapter-and-image-region-integration.md"
      - "specs/ml-kit-recognition-adapter-and-image-region-integration.test.md"
      - "src/main/kotlin/com/kingsmetric/app/MlKitRecognitionAdapter.kt"
      - "src/test/kotlin/com/kingsmetric/app/MlKitRecognitionAdapterIntegrationTest.kt"
      - "src/main/kotlin/com/kingsmetric/importflow/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run ML Kit adapter tests
        run: >
          ./gradlew --no-daemon :core:test
          --tests "com.kingsmetric.app.MlKitRecognitionAdapterIntegrationTest"
          --tests "com.kingsmetric.importflow.RecognitionPipelineTest"

      - name: Assemble Android ML Kit targets
        run: >
          ./gradlew --no-daemon :app:assembleDebug :app:assembleDebugAndroidTest
