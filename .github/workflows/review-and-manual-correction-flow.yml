name: Review And Manual Correction Flow

on:
  pull_request:
    paths:
      - ".github/workflows/review-and-manual-correction-flow.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "specs/review-and-manual-correction-flow.md"
      - "specs/review-and-manual-correction-flow.test.md"
      - "specs/personal-stats-screenshot-import.md"
      - "specs/personal-stats-screenshot-import.test.md"
      - "src/main/kotlin/com/kingsmetric/importflow/**"
      - "src/test/kotlin/com/kingsmetric/importflow/**"
  push:
    branches:
      - main
      - feature/**
    paths:
      - ".github/workflows/review-and-manual-correction-flow.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "specs/review-and-manual-correction-flow.md"
      - "specs/review-and-manual-correction-flow.test.md"
      - "specs/personal-stats-screenshot-import.md"
      - "specs/personal-stats-screenshot-import.test.md"
      - "src/main/kotlin/com/kingsmetric/importflow/**"
      - "src/test/kotlin/com/kingsmetric/importflow/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Run review flow tests
        run: >
          gradle --no-daemon test
          --tests "com.kingsmetric.importflow.ReviewAndManualCorrectionFlowTest"
          --tests "com.kingsmetric.importflow.ImportWorkflowIntegrationTest"
