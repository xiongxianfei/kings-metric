name: Unsupported Case And Failure Handling

on:
  pull_request:
    paths:
      - ".github/workflows/unsupported-case-and-failure-handling.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "specs/unsupported-case-and-failure-handling.md"
      - "specs/unsupported-case-and-failure-handling.test.md"
      - "specs/personal-stats-screenshot-import.md"
      - "specs/personal-stats-screenshot-import.test.md"
      - "src/main/kotlin/com/kingsmetric/importflow/**"
      - "src/test/kotlin/com/kingsmetric/importflow/**"
  push:
    branches:
      - main
      - feature/**
    paths:
      - ".github/workflows/unsupported-case-and-failure-handling.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "specs/unsupported-case-and-failure-handling.md"
      - "specs/unsupported-case-and-failure-handling.test.md"
      - "specs/personal-stats-screenshot-import.md"
      - "specs/personal-stats-screenshot-import.test.md"
      - "src/main/kotlin/com/kingsmetric/importflow/**"
      - "src/test/kotlin/com/kingsmetric/importflow/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run failure-handling tests
        run: >
          ./gradlew --no-daemon :core:test
          --tests "com.kingsmetric.importflow.UnsupportedCaseAndFailureHandlingTest"
          --tests "com.kingsmetric.importflow.ImportFeatureTest"
          --tests "com.kingsmetric.importflow.LocalPersistenceAndScreenshotLinkageTest"
